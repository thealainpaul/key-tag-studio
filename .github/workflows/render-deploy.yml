name: Deploy to Render

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/last-heartbeat.txt"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — relying on Render auto-deploy from GitHub"
            exit 0
          fi
          curl -fsS "$HOOK"
          echo "Render deploy triggered"
