# GitHub disables scheduled workflows after 60 days with no repo activity.
# This monthly commit keeps Actions schedules enabled permanently.

name: Actions heartbeat

on:
  schedule:
    - cron: "0 12 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update heartbeat timestamp
        run: date -u +%Y-%m-%dT%H:%M:%SZ > .github/last-heartbeat.txt

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-heartbeat.txt
          git diff --staged --quiet && echo "No change" && exit 0
          git commit -m "chore: actions heartbeat [skip ci]"
          git push
